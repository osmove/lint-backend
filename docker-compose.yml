services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lint
      POSTGRES_PASSWORD: lint_dev
      POSTGRES_DB: lint_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: lint
      DATABASE_PASSWORD: lint_dev
      DATABASE_NAME: lint_development
      DATABASE_PORT: "5432"
      RAILS_ENV: development
      SECRET_KEY_BASE: dev_secret_key_base_change_me_in_production
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle

volumes:
  postgres_data:
  bundle_cache:
