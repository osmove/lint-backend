plugins:
  - rubocop-rails
  - rubocop-performance

inherit_from:
  - .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'db/migrate/**/*'
    - 'db/schema.rb'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - '_permanent/**/*'

Layout/LineLength:
  Max: 160
  Severity: warning

Layout/AccessModifierIndentation:
  Enabled: true
  EnforcedStyle: outdent
  Severity: warning

Lint/InheritException:
  Enabled: true
  EnforcedStyle: runtime_error
  Severity: warning

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

# Legacy codebase carries many camelCase locals. Refactoring 288 variables
# for cosmetic snake_case is not worth it.
Naming/VariableName:
  Enabled: false
