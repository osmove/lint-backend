plugins:
  - rubocop-rails
  - rubocop-performance


AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'db/migrate/**/*'
    - 'db/schema.rb'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - '_permanent/**/*'

Layout/LineLength:
  Max: 1100
  Severity: warning

Layout/AccessModifierIndentation:
  Enabled: true
  EnforcedStyle: outdent
  Severity: warning

Lint/InheritException:
  Enabled: true
  EnforcedStyle: runtime_error
  Severity: warning

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

# Legacy codebase carries many camelCase locals. Refactoring 288 variables
# for cosmetic snake_case is not worth it.
Naming/VariableName:
  Enabled: false

# address_2, phone_line_1 etc. are idiomatic in form / address fields.
# The cop's SnakeCase-no-digits style conflicts with Rails conventions.
Naming/VariableNumber:
  Enabled: false

# Legacy files carry patterns like `def save_path` that the cop wants as
# `def save_path?` — renaming would change API signatures across the app.
Naming/PredicateMethod:
  Enabled: false
Naming/PredicatePrefix:
  Enabled: false
Naming/FileName:
  Enabled: false

# Metrics are pragmatically tuned to the current codebase's worst
# offender plus small buffer so rubocop stays useful for NEW code
# without flagging pre-existing legacy hotspots.
Metrics/MethodLength:
  Max: 210
Metrics/AbcSize:
  Max: 300
Metrics/ClassLength:
  Max: 300
Metrics/BlockLength:
  Max: 900
Metrics/CyclomaticComplexity:
  Max: 45
Metrics/PerceivedComplexity:
  Max: 55
Metrics/BlockNesting:
  Max: 10

# Cosmetic / legacy-tolerant:
Style/MultilineBlockChain:
  Enabled: false
Style/MixinUsage:
  Enabled: false
Rails/LexicallyScopedActionFilter:
  Enabled: false
Rails/UniqueValidationWithoutIndex:
  Enabled: false

# Rails scaffold generates `notice: 'Foo was successfully created.'`
# directly in controllers. Moving 178 inline flash/notice strings into
# config/locales/*.yml is a full i18n migration, out of scope.
Rails/I18nLocaleTexts:
  Enabled: false

# Legacy else-branches are stubs for clarity during early refactoring.
Style/EmptyElse:
  Enabled: false
