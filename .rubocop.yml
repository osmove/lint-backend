AllCops:
  DisabledByDefault: true
Lint/InheritException:
  Enabled: true
  EnforcedStyle: runtime_error
  Severity: warning
Metrics/LineLength:
  Enabled: true
  AllowHeredoc: false
  Severity: warning
  Max: 80
Layout/AccessModifierIndentation:
  Enabled: true
  EnforcedStyle: outdent
  Severity: warning
