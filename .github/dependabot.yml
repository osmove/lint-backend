version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rails:
        patterns:
          - "rails"
          - "activerecord"
          - "activesupport"
          - "actionpack"
          - "actionview"
          - "actionmailer"
          - "activejob"
          - "activestorage"
          - "actioncable"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
